<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Indent Form</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet">
<style>
  :root{
    --brand:#0f6b53;
    --brand-dark:#0a4d3c;
    --bg:#f4f6f5;
    --card:#ffffff;
    --border:#dfe4e2;
    --text:#1c2624;
    --muted:#6b7674;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:100px;
  }
  header{
    background:var(--brand-dark);
    color:#fff;
    padding:18px 20px;
    position:sticky;
    top:0;
    z-index:10;
  }
  header h1{margin:0;font-size:1.2rem;font-weight:600;}
  header .sub{font-size:.8rem;opacity:.8;margin-top:2px;}
  .wrap{max-width:720px;margin:0 auto;padding:16px;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    margin-bottom:16px;
  }
  .card h2{font-size:1rem;margin:0 0 12px;color:var(--brand-dark);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;}
  .field input,.field textarea{
    width:100%;padding:10px 10px;border:1px solid var(--border);
    border-radius:8px;font-size:.95rem;background:#fff;color:var(--text);
    font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:70px;}
  .field input:focus,.field textarea:focus{outline:2px solid var(--brand);border-color:var(--brand);}

  /* --- Select2 theming to match the form --- */
  .select2-container{width:100% !important;}
  .select2-container .select2-selection--single{
    height:41px;border:1px solid var(--border);border-radius:8px;
    display:flex;align-items:center;padding:0 10px;
  }
  .select2-container .select2-selection--single .select2-selection__rendered{
    padding:0;line-height:normal;color:var(--text);
  }
  .select2-container .select2-selection--single .select2-selection__arrow{height:39px;}
  .select2-dropdown{border-color:var(--border);border-radius:8px;overflow:hidden;}
  .select2-container--default .select2-results__option--highlighted[aria-selected]{
    background-color:var(--brand);
  }
  .select2-selection--single.select2-invalid{border-color:#c0392b !important;background:#fdecea;}

  .line-card{
    border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;
    background:#fbfdfc;position:relative;
  }
  .line-card .line-header{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
  }
  .line-header span{font-weight:700;color:var(--brand-dark);font-size:.85rem;}
  .remove-btn{
    background:none;border:none;color:#c0392b;font-size:.8rem;cursor:pointer;font-weight:600;
  }
  .img-row{display:flex;align-items:center;gap:12px;}
  .img-preview{
    width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--border);
    background:#eee;display:none;
  }
  .camera-btn{
    display:inline-block;padding:9px 14px;border-radius:8px;border:1px dashed var(--brand);
    color:var(--brand-dark);font-size:.85rem;cursor:pointer;background:#fff;
  }
  .camera-btn.invalid{border-color:#c0392b;background:#fdecea;color:#c0392b;}
  .camera-modal{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;
    flex-direction:column;align-items:center;justify-content:center;padding:16px;
  }
  .camera-modal.open{display:flex;}
  .camera-modal video, .camera-modal canvas{
    width:100%;max-width:480px;border-radius:12px;background:#000;
  }
  .camera-modal canvas{display:none;}
  .camera-controls{
    display:flex;gap:14px;margin-top:16px;width:100%;max-width:480px;
  }
  .camera-controls button{
    flex:1;padding:14px;border-radius:10px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;
  }
  .cam-shoot{background:var(--brand);color:#fff;}
  .cam-retake{background:#fff;color:var(--brand-dark);display:none;}
  .cam-use{background:var(--brand);color:#fff;display:none;}
  .cam-cancel{background:#3a3a3a;color:#fff;}
  .camera-hint{color:#fff;opacity:.75;font-size:.8rem;margin-top:10px;text-align:center;}
  .add-line-btn{
    width:100%;padding:12px;border-radius:10px;border:2px dashed var(--brand);
    background:#fff;color:var(--brand-dark);font-weight:600;cursor:pointer;font-size:.9rem;
  }
  .footer-bar{
    position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);
    padding:12px 16px;display:flex;gap:10px;justify-content:center;
  }
  .footer-bar .inner{max-width:720px;width:100%;display:flex;gap:10px;}
  .submit-btn{
    flex:1;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:10px;
    font-size:1rem;font-weight:700;cursor:pointer;
  }
  .submit-btn:disabled{background:#9fb8b1;cursor:not-allowed;}
  .status{
    max-width:720px;margin:10px auto;padding:10px 14px;border-radius:8px;font-size:.85rem;display:none;
  }
  .status.ok{background:#e4f7ec;color:#146c43;display:block;}
  .status.err{background:#fdecea;color:#b02a1e;display:block;}
  @media (max-width:520px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header>
  <h1>Material Indent / Request Form</h1>
  <div class="sub">Indent No: <span id="indentNoDisplay">…</span></div>
</header>

<div class="wrap">

  <!-- ===== Production details — entered ONCE per indent ===== -->
  <div class="card">
    <h2>Production Details</h2>
    <div class="grid">
      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label>Sales Man</label>
        <select id="salesMan"><option value=""></option></select>
      </div>
      <div class="field">
        <label>Item</label>
        <select id="prodItem"><option value=""></option></select>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="prodCategory"><option value=""></option></select>
      </div>
      <div class="field">
        <label>Purity</label>
        <select id="prodPurity"><option value=""></option></select>
      </div>
      <div class="field">
        <label>Size</label>
        <select id="prodSize"><option value=""></option></select>
      </div>
      <div class="field">
        <label>Shape</label>
        <input type="text" id="prodShape" placeholder="Type Product Shape">
      </div>
    </div>
    <div class="field">
      <label>Design / Quality</label>
      <textarea id="prodDesignQuality" rows="3" placeholder="Enter design / quality details…"></textarea>
    </div>
  </div>

  <!-- ===== Repeatable lines: Weight / Qty / Remark / Photo ===== -->
  <div id="linesContainer"></div>

  <button class="add-line-btn" id="addLineBtn" type="button">+ Add Weight / Qty Line</button>

</div>

<div class="status" id="status"></div>

<div class="footer-bar">
  <div class="inner">
    <button class="submit-btn" id="submitBtn">Submit Indent</button>
  </div>
</div>

<!-- Template for one weight/qty/remark/photo line -->
<template id="lineTemplate">
  <div class="line-card">
    <div class="line-header">
      <span class="line-label">Line #1</span>
      <button type="button" class="remove-btn">Remove</button>
    </div>
    <div class="grid">
      <div class="field"><label>Weight</label>
        <input type="number" step="0.01" data-key="wt" placeholder="e.g. 1.5"></div>
      <div class="field"><label>Qty</label>
        <input type="number" data-key="qty" placeholder="e.g. 2"></div>
    </div>
    <div class="field"><label>Remark / Note</label>
      <input type="text" data-key="remark" placeholder="e.g. urgent, recheck stone"></div>
    <div class="field">
      <label>Live Photo</label>
      <div class="img-row">
        <button type="button" class="camera-btn" data-action="open-camera">📷 Take Photo</button>
        <img class="img-preview">
      </div>
    </div>
  </div>
</template>

<!-- Live camera modal (shared by all lines, one stream at a time) -->
<div class="camera-modal" id="cameraModal">
  <video id="camVideo" autoplay playsinline muted></video>
  <canvas id="camCanvas"></canvas>
  <div class="camera-controls">
    <button type="button" class="cam-cancel" id="camCancel">Cancel</button>
    <button type="button" class="cam-shoot" id="camShoot">Capture</button>
    <button type="button" class="cam-retake" id="camRetake">Retake</button>
    <button type="button" class="cam-use" id="camUse">Use Photo</button>
  </div>
  <div class="camera-hint">Point the camera at the item, then tap Capture.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
<script>
// ====== CONFIG - EDIT THIS ======
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlJkbqtIxhd3uCcGo-G2Klwp2Vg7-VM8CJJLFgl_hT1Qmcd2BEEZRxocya377MUYDTZg/exec';
// =================================

// Maps our internal keys to the column headers you use in the "Lists" sheet tab.
const LIST_HEADER_MAP = {
  salesMan: 'SALES MAN',
  item: 'ITEM',
  category: 'CATEFORY',
  purity: 'PURITY',
  shape: 'SHAPE' // used by the "Size" field (kept consistent with existing Sheet column mapping)
};

let dropdownData = {};
let indentNo = null;
let lineCount = 0;

const linesContainer = document.getElementById('linesContainer');
const lineTemplate = document.getElementById('lineTemplate');
const statusBox = document.getElementById('status');

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}
document.getElementById('date').value = todayStr();

function showStatus(msg, ok){
  statusBox.textContent = msg;
  statusBox.className = 'status ' + (ok ? 'ok' : 'err');
  setTimeout(()=>{ statusBox.className='status'; }, 4000);
}

async function init(){
  try{
    const [dd, ni] = await Promise.all([
      fetch(APPS_SCRIPT_URL + '?action=getDropdowns').then(r=>r.json()),
      fetch(APPS_SCRIPT_URL + '?action=nextIndentNo').then(r=>r.json())
    ]);
    dropdownData = dd;
    indentNo = ni.indentNo;
    document.getElementById('indentNoDisplay').textContent = indentNo;

    setupSelect2('#salesMan', LIST_HEADER_MAP.salesMan);
    setupSelect2('#prodItem', LIST_HEADER_MAP.item);
    setupSelect2('#prodCategory', LIST_HEADER_MAP.category);
    setupSelect2('#prodPurity', LIST_HEADER_MAP.purity);
    setupSelect2('#prodSize', LIST_HEADER_MAP.shape);

    addLine();
  }catch(err){
    showStatus('Could not load dropdown data. Check APPS_SCRIPT_URL.', false);
  }
}

// Fills a <select> with the sheet's list values and turns it into a searchable
// Select2 dropdown. Because it's a real <select> with fixed <option>s (no
// tags:true), the user can ONLY pick a listed value — free typing is impossible.
function setupSelect2(selector, headerName){
  const $el = $(selector);
  const opts = dropdownData[headerName] || [];
  opts.forEach(v=>{
    $el.append(new Option(v, v, false, false));
  });
  $el.select2({
    placeholder: 'Search or select…',
    allowClear: true,
    width: '100%'
  });
  $el.on('select2:select', ()=> $el.next('.select2-container').find('.select2-selection--single').removeClass('select2-invalid'));
}

function addLine(){
  lineCount++;
  const node = lineTemplate.content.cloneNode(true);
  const card = node.querySelector('.line-card');
  card.dataset.index = lineCount;
  node.querySelector('.line-label').textContent = 'Line #' + lineCount;

  const preview = card.querySelector('.img-preview');
  card.querySelector('[data-action="open-camera"]').addEventListener('click', ()=>{
    openCamera(card, preview);
  });

  card.querySelector('.remove-btn').addEventListener('click', ()=>{
    card.remove();
  });

  linesContainer.appendChild(card);
}

document.getElementById('addLineBtn').addEventListener('click', addLine);

// ---------- Live camera (video tag) ----------
const cameraModal = document.getElementById('cameraModal');
const camVideo = document.getElementById('camVideo');
const camCanvas = document.getElementById('camCanvas');
const camShoot = document.getElementById('camShoot');
const camRetake = document.getElementById('camRetake');
const camUse = document.getElementById('camUse');
const camCancel = document.getElementById('camCancel');

let camStream = null;
let activeCard = null;
let activePreview = null;
let capturedDataUrl = null;

async function openCamera(card, preview){
  activeCard = card;
  activePreview = preview;
  capturedDataUrl = null;
  cameraModal.classList.add('open');
  resetCameraButtons();
  try{
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
    camVideo.srcObject = camStream;
    camVideo.style.display = 'block';
    camCanvas.style.display = 'none';
  }catch(err){
    showStatus('Camera access denied or unavailable.', false);
    closeCamera();
  }
}

function resetCameraButtons(){
  camShoot.style.display = 'inline-block';
  camRetake.style.display = 'none';
  camUse.style.display = 'none';
}

camShoot.addEventListener('click', ()=>{
  const w = camVideo.videoWidth, h = camVideo.videoHeight;
  camCanvas.width = w; camCanvas.height = h;
  camCanvas.getContext('2d').drawImage(camVideo, 0, 0, w, h);
  capturedDataUrl = camCanvas.toDataURL('image/jpeg', 0.85);
  camVideo.style.display = 'none';
  camCanvas.style.display = 'block';
  camShoot.style.display = 'none';
  camRetake.style.display = 'inline-block';
  camUse.style.display = 'inline-block';
});

camRetake.addEventListener('click', ()=>{
  capturedDataUrl = null;
  camVideo.style.display = 'block';
  camCanvas.style.display = 'none';
  resetCameraButtons();
});

camUse.addEventListener('click', ()=>{
  if(activeCard && capturedDataUrl){
    activeCard.dataset.imageBase64 = capturedDataUrl;
    activePreview.src = capturedDataUrl;
    activePreview.style.display = 'block';
    activeCard.querySelector('[data-action="open-camera"]').classList.remove('invalid');
  }
  closeCamera();
});

camCancel.addEventListener('click', closeCamera);

function closeCamera(){
  if(camStream){
    camStream.getTracks().forEach(t=>t.stop());
    camStream = null;
  }
  cameraModal.classList.remove('open');
  activeCard = null;
  activePreview = null;
  capturedDataUrl = null;
}
// ----------------------------------------------

function collectLine(card){
  const data = {};
  card.querySelectorAll('[data-key]').forEach(el=>{
    data[el.dataset.key] = el.value;
  });
  data.image = card.dataset.imageBase64 || '';
  return data;
}

function markSelectInvalid(selector){
  $(selector).next('.select2-container').find('.select2-selection--single').addClass('select2-invalid');
}

async function submitAll(){
  const lines = linesContainer.querySelectorAll('.line-card');
  if(lines.length === 0){ showStatus('Add at least one line.', false); return; }

  const date = document.getElementById('date').value;
  const salesMan = $('#salesMan').val();
  const item = $('#prodItem').val();
  const category = $('#prodCategory').val();
  const purity = $('#prodPurity').val();
  const size = $('#prodSize').val(); // maps to SHAPE column, kept same as before
  const designQuality = document.getElementById('prodDesignQuality').value.trim();
  const shapeField = document.getElementById('prodShape').value.trim(); // maps to SIZE column, kept same as before

  // Real <select> elements only ever hold a listed value (or empty) — just check they're filled.
  const requiredSelects = [
    ['#salesMan', salesMan, 'Sales Man'],
    ['#prodItem', item, 'Item'],
    ['#prodCategory', category, 'Category'],
    ['#prodPurity', purity, 'Purity'],
    ['#prodSize', size, 'Size']
  ];
  for(const [sel, val, label] of requiredSelects){
    if(!val){
      markSelectInvalid(sel);
      showStatus('Select a ' + label + '.', false);
      $(sel).select2('open');
      return;
    }
  }

  // Every line must have a captured photo.
  for(const card of lines){
    if(!card.dataset.imageBase64){
      const camBtn = card.querySelector('[data-action="open-camera"]');
      camBtn.classList.add('invalid');
      const label = card.querySelector('.line-label').textContent;
      showStatus('Photo required for ' + label + ' — tap Take Photo before submitting.', false);
      camBtn.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
  }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting…';

  let okCount = 0;
  let lastError = '';
  for(const card of lines){
    const line = collectLine(card);
    const payload = {
      indentNo, date, salesMan,
      item, category, purity,
      designQuality,
      size: shapeField,   // SIZE column <- "Shape" free-text field
      shape: size,        // SHAPE column <- "Size" select field
      wt: line.wt,
      qty: line.qty,
      vendorSuggestion: line.remark,  // sheet column stays REMARK/NOTE, see README
      imageBase64: line.image
    };
    try{
      const res = await fetch(APPS_SCRIPT_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight
        body: JSON.stringify(payload)
      });
      if(!res.ok){
        lastError = 'HTTP ' + res.status + ' ' + res.statusText;
        continue;
      }
      const json = await res.json();
      if(json.success){
        okCount++;
      } else {
        lastError = json.error || 'Unknown script error';
      }
    }catch(err){
      lastError = err.message || String(err);
    }
  }

  submitBtn.disabled = false;
  submitBtn.textContent = 'Submit Indent';

  if(okCount === lines.length){
    showStatus('Saved ' + okCount + ' line(s) under Indent No ' + indentNo + '.', true);
    linesContainer.innerHTML = '';
    lineCount = 0;
    // reset production fields for the next indent
    ['#salesMan','#prodItem','#prodCategory','#prodPurity','#prodSize'].forEach(sel=>$(sel).val(null).trigger('change'));
    document.getElementById('prodShape').value = '';
    document.getElementById('prodDesignQuality').value = '';
    document.getElementById('date').value = todayStr();
    // fetch a fresh indent number for the next batch
    const ni = await fetch(APPS_SCRIPT_URL + '?action=nextIndentNo').then(r=>r.json());
    indentNo = ni.indentNo;
    document.getElementById('indentNoDisplay').textContent = indentNo;
    addLine();
  } else {
    showStatus('Saved ' + okCount + '/' + lines.length + ' lines. Error: ' + lastError, false);
  }
}

document.getElementById('submitBtn').addEventListener('click', submitAll);

init();
</script>
</body>
</html>
