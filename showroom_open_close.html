```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Showroom Open Close Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen p-4">

<div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl p-5">

<h1 class="text-2xl font-bold text-center text-black mb-5">
Jewellery Showroom Tracker
</h1>

<!-- OPEN CLOSE -->
<div class="grid grid-cols-2 gap-3 mb-4">

<label class="cursor-pointer">
<input type="radio" name="type" value="OPEN" checked class="hidden peer">

<div class="border-2 border-green-400 rounded-2xl p-4 text-center font-bold
bg-green-50 text-green-700
peer-checked:bg-green-600
peer-checked:text-white">

🟢 OPEN

</div>
</label>

<label class="cursor-pointer">
<input type="radio" name="type" value="CLOSE" class="hidden peer">

<div class="border-2 border-red-400 rounded-2xl p-4 text-center font-bold
bg-red-50 text-red-700
peer-checked:bg-red-600
peer-checked:text-white">

🔴 CLOSE

</div>
</label>

</div>

<!-- DOER -->
<input
type="text"
id="doer"
placeholder="Enter Doer Name"
class="w-full border-2 border-gray-200 rounded-xl p-3 mb-4">

<!-- CAMERA -->
<div class="relative w-full h-72 bg-black rounded-3xl overflow-hidden mb-4">

<video
id="video"
autoplay
playsinline
class="absolute inset-0 w-full h-full object-cover">
</video>

<img
id="preview"
class="absolute inset-0 w-full h-full object-cover hidden">

</div>

<!-- BUTTONS -->
<div class="grid grid-cols-2 gap-3 mb-4">

<button
onclick="startCamera()"
class="bg-blue-600 text-white p-3 rounded-xl font-bold">

Start Camera

</button>

<button
onclick="capturePhoto()"
class="bg-green-600 text-white p-3 rounded-xl font-bold">

Capture

</button>

</div>

<!-- REMARK -->
<textarea
id="remark"
rows="3"
placeholder="Remark (optional)"
class="w-full border-2 border-gray-200 rounded-xl p-3 mb-4"></textarea>

<!-- SUBMIT -->
<button
onclick="submitData()"
class="w-full bg-black text-white p-3 rounded-xl font-bold">

Submit

</button>

<!-- STATUS -->
<div
id="status"
class="text-center mt-4 font-semibold">
</div>

</div>

<canvas id="canvas" class="hidden"></canvas>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyDs1vOfYU2ffBLYs7SWvtHQYXwzrxmGeMmmyt2wxbEKx_coFtsq5glvMgorGqCPF4/exec";

let stream;
let imageData = "";

// START CAMERA
async function startCamera(){

try{

stream = await navigator.mediaDevices.getUserMedia({

video:{
facingMode:'environment',
width:{ ideal:1280 },
height:{ ideal:720 }
},

audio:false

});

document.getElementById("video").srcObject = stream;

}catch(err){

alert(err.message);

}

}

// CAPTURE
function capturePhoto(){

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0);

ctx.fillStyle = "rgba(0,0,0,0.6)";
ctx.fillRect(0,canvas.height-80,canvas.width,80);

ctx.fillStyle = "white";
ctx.font = "24px Arial";

const type =
document.querySelector('input[name="type"]:checked').value;

ctx.fillText(
type,
20,
canvas.height-45
);

ctx.fillText(
new Date().toLocaleString(),
20,
canvas.height-15
);

imageData =
canvas.toDataURL("image/jpeg",0.7);

document.getElementById("preview").src =
imageData;

document.getElementById("preview")
.classList.remove("hidden");

}

// SUBMIT
async function submitData(){

const doer =
document.getElementById("doer").value;

if(!doer){

alert("Enter Doer Name");
return;

}

if(!imageData){

alert("Capture Photo");
return;

}

document.getElementById("status")
.innerHTML = "Submitting...";

const payload = {

type:
document.querySelector(
'input[name="type"]:checked'
).value,

doer,

remark:
document.getElementById("remark").value,

photo:imageData

};

try{

const response =
await fetch(WEB_APP_URL,{

method:"POST",

body:JSON.stringify(payload)

});

const result =
await response.json();

if(result.success){

document.getElementById("status")
.innerHTML =
"✅ Submitted Successfully";

setTimeout(()=>{
location.reload();
},2000);

}else{

throw new Error(result.error);

}

}catch(err){

console.log(err);

document.getElementById("status")
.innerHTML =
"❌ Submission Failed";

}

}

window.onload = startCamera;

</script>

</body>
</html>
```
